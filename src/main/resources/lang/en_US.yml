# MoRuneSocketing English Language File
# Author: Allen_Linong

# ==================== Message Prefix ====================
prefix: "§8[§6MoRune§8] §r"

# ==================== General Messages ====================
no-permission: "§cYou don't have permission!"
player-only: "§cThis command can only be executed by a player!"
insert-success: "§aRune socketing successful!"
insert-failed: "§cRune socketing failed!"
max-buff-runes: "§cThis equipment has reached the maximum buff rune limit!"
missing-enchantment: "§cThis equipment needs to have the same enchantment first to use this rune!"
insufficient-funds: "§cYou don't have enough money! Need §e%cost% §ccoins"
invalid-rune-or-item: "§cInvalid rune or equipment!"
invalid-rune-config: "§cInvalid rune configuration, cannot socket!"
max-enchantment-level: "§cThe same enchantment on this equipment has reached the maximum level limit of this rune!"
invalid-enchantment-type: "§cInvalid enchantment type: %enchantment%!"
buff-apply-unknown-error: "§cCannot apply buff, unknown error!"
enchantment-apply-unknown-error: "§cCannot apply enchantment, unknown error!"
same-buff-level: "§cThis equipment already has a buff rune of the same level, cannot socket!"
lower-buff-level: "§cThis equipment already has a higher level buff rune (current: %current_level%, rune: %rune_level%), cannot socket!"

# ==================== Menu Messages ====================
menu:
  disabled: "§cSocketing feature is disabled!"
  config-error: "§cMenu configuration file not found or failed to load!"
  invalid-item: "§cPlease put in a valid equipment!"
  invalid-equipment: "§cThis item cannot be enchanted!"
  invalid-rune: "§cPlease put in a valid rune!"
  wrong-rune: "§cPlease put in a correct rune!"
  cannot-socket-rune: "§cThis item cannot socket runes!"

# ==================== Command messages ====================
command:
  unknown: "§cUnknown command! Type /mrs help for help."
  no-admin-permission: "§cYou don't have permission to use this command!"
  setrate:
    disabled: "§cRandom success rate feature is disabled!"
    usage: "§cUsage: /mrs setrate <rate>"
    current: "§eCurrent random success rate: §a%rate%%"
    invalid-number: "§cRate must be a number!"
    out-of-range: "§cRate must be between %min%% and %max%%!"
    success: "§aSuccess rate set to: §e%rate%%"
    time-unchanged: "§7Next refresh time unchanged, will continue to refresh at the scheduled time."
  setinterval:
    disabled: "§cRandom success rate feature is disabled!"
    usage: "§cUsage: /mrs setinterval <time> [unit]"
    invalid-time: "§cTime must be a positive integer!"
    invalid-unit: "§cInvalid time unit! Supported: s(seconds), m(minutes), h(hours), d(days)"
    too-short: "§cRefresh interval cannot be less than 60 seconds!"
    success: "§aRandom success rate refresh interval set to: §e%time%%unit%"
  give:
    usage: "§cUsage: /mrs give <player> <rune> [amount]"
    player-not-found: "§cPlayer not found: §e%player%"
    rune-not-found: "§cRune not found: §e%rune%"
    invalid-amount: "§cAmount must be a positive integer!"
    success: "§aSuccessfully gave §e%player% §a%amount% §e%rune%§a!"
  reload:
    success: "§aConfiguration reloaded!"
  analyze:
    no-item: "§cYou are not holding any item!"
    no-enchant: "§cThis item has no enchantments!"
    header: "§6===== Enchantment Analysis ====="
    entry: "§a%key% §7→ §eLevel: §f%level%"

# ==================== Rune remover messages ====================
rune-remover:
  success: "§aRune removal successful!"
  no-buffs: "§cThis equipment has no removable buff runes!"
  give-success: "§aSuccessfully gave §e%player% §a%amount% §eRune Remover§a!"
