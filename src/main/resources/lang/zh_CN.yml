# MoRuneSocketing 中文语言文件
# 作者: Allen_Linong

# ==================== 消息前缀 ====================
prefix: "§8[§6MoRune§8] §r"

# ==================== 通用消息 ====================
no-permission: "§c你没有权限！"
player-only: "§c该命令只能由玩家执行！"
insert-success: "§a符文镶嵌成功！"
insert-failed: "§c符文镶嵌失败！"
max-buff-runes: "§c该装备已达到最大buff符文数量限制！"
missing-enchantment: "§c该装备需要先拥有相同附魔才能使用此符文！"
insufficient-funds: "§c你的金币不足！需要 §e%cost% §c金币"
invalid-rune-or-item: "§c符文或装备无效！"
invalid-rune-config: "§c符文配置无效，无法镶嵌！"
max-enchantment-level: "§c该装备的相同附魔已达到该符文的最大等级限制！"
invalid-enchantment-type: "§c无效的附魔类型：%enchantment%！"
buff-apply-unknown-error: "§c无法应用BUFF，未知原因！"
enchantment-apply-unknown-error: "§c无法应用附魔，未知原因！"
same-buff-level: "§c该装备已拥有相同等级的BUFF符文，无法镶嵌！"
lower-buff-level: "§c该装备已拥有更高等级的BUFF符文（当前：%current_level%级，符文：%rune_level%级），无法镶嵌！"

# ==================== 菜单相关消息 ====================
menu:
  disabled: "§c镶嵌功能已禁用！"
  config-error: "§c菜单配置文件不存在或加载失败！"
  invalid-item: "§c请放入有效的装备！"
  invalid-equipment: "§c该物品无法附魔！"
  invalid-rune: "§c请放入有效的符文！"
  wrong-rune: "§c请放入正确的符文！"
  cannot-socket-rune: "§c该物品无法镶嵌符文！"

# ==================== 命令相关消息 ====================
command:
  unknown: "§c未知命令！输入 /mrs help 查看帮助。"
  no-admin-permission: "§c你没有权限使用该命令！"
  setrate:
    disabled: "§c随机成功率功能未启用！"
    usage: "§c用法: /mrs setrate <成功率>"
    current: "§e当前随机成功率: §a%rate%%"
    invalid-number: "§c成功率必须是数字！"
    out-of-range: "§c成功率必须在 %min%% 到 %max%% 之间！"
    success: "§a成功率已设置为: §e%rate%%"
    time-unchanged: "§7下次刷新时间不变，将继续按原定时间刷新。"
  setinterval:
    disabled: "§c随机成功率功能未启用！"
    usage: "§c用法: /mrs setinterval <时间> [单位]"
    invalid-time: "§c时间必须是正整数！"
    invalid-unit: "§c无效的时间单位！支持: s(秒), m(分钟), h(小时), d(天)"
    too-short: "§c刷新间隔不能少于60秒！"
    success: "§a随机成功率刷新间隔已设置为: §e%time%%unit%"
  give:
    usage: "§c用法: /mrs give <玩家> <符文ID> [数量]"
    player-not-found: "§c找不到玩家: §e%player%"
    rune-not-found: "§c找不到符文: §e%rune%"
    invalid-amount: "§c数量必须是正整数！"
    success: "§a成功给予 §e%player% §a%amount% 个 §e%rune%§a！"
  reload:
    success: "§a配置文件已重载！"

# ==================== 符文拆卸粉相关消息 ====================
rune-remover:
  success: "§a符文拆卸成功！"
  no-buffs: "§c该装备上没有可拆卸的buff符文！"
  give-success: "§a成功给予 §e%player% §a%amount% 个 §e符文拆卸粉§a！"
