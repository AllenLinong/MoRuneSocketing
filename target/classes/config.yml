# ==================== 语言配置 ====================
# 语言文件选择
# 可选: zh_CN (中文), en_US (英文)
# 语言文件位于 plugins/MoRuneSocketing/lang/ 文件夹中
language: "zh_CN"

# ==================== 数据库配置 ====================
database:
  # 是否启用数据库同步
  # 启用后可在多服务器间同步成功率数据
  enabled: false
  
  # 数据库类型
  # 可选: mysql (MySQL数据库), sqlite (本地SQLite数据库)
  type: "sqlite"
  
  # MySQL配置 (仅在 type 为 mysql 时有效)
  mysql:
    # 数据库主机地址
    host: "localhost"
    # 数据库端口
    port: 3306
    # 数据库名称
    database: "morunesocketing"
    # 数据库用户名
    username: "root"
    # 数据库密码
    password: "password"
    # 连接池配置
    pool:
      # 最小连接数
      min-connections: 2
      # 最大连接数
      max-connections: 10
      # 连接超时时间 (毫秒)
      connection-timeout: 30000
  
  # 数据同步配置
  sync:
    # 是否同步成功率数据
    sync-success-rate: true
    # 同步间隔 (秒)
    sync-interval: 60

# ==================== 镶嵌设置 ====================
socketing:
  # 镶嵌冷却时间（秒）
  cooldown: 0.5
  
  # 经济系统配置
  economy:
    # 是否启用镶嵌费用
    enabled: false
    # 镶嵌费用（金币）
    cost: 1000
    # 是否只在镶嵌成功时扣除金币
    # true: 只在成功时扣除金币（失败不扣金币）
    # false: 镶嵌时立即扣除金币（无论成功失败）
    deduct-on-success-only: false
    # 经济插件类型（支持多种，按优先级尝试）
    # 可选: Vault, PlayerPoints, GemsEconomy, RedisEconomy, PEconomy
    # 如果留空或无法识别，将自动检测已安装的经济插件
    provider: ""

# ==================== 菜单功能配置 ====================
features:
  # 是否启用镶嵌菜单功能
  # 关闭后玩家无法使用镶嵌功能，适合跨服时让某个服务器禁用镶嵌
  # 如需要实现跨服buff符文效果，需每个服务器都安装该插件
  enable-socketing-menu: true
  
  # 是否消耗符文
  consume-rune: true
  
  # 镶嵌失败时是否消耗符文
  consume-rune-on-fail: true
  
  # 镶嵌成功率 (%)
  # 当随机成功率关闭时，使用此固定值
  # 当随机成功率开启时，此值被忽略，使用 random-success-rate 中的配置
  success-rate: 100
  
  # 随机成功率配置
  random-success-rate:
    # 是否启用随机成功率
    enabled: false
    # 随机成功率范围 (最低值-最高值)
    min-rate: 50
    max-rate: 100
    # 刷新间隔 (支持格式: 1d=1天, 1h=1小时, 30m=30分钟, 60s=60秒)
    # 最低限制60秒
    refresh-interval: "1h"
  
  # 是否播放音效
  play-sound: true
  success-sound: "BLOCK_ANVIL_USE"
  fail-sound: "BLOCK_ANVIL_DESTROY"
  
  # 每个装备可镶嵌的buff类符文最大数量
  max-buff-runes-per-item: 2
  
  # 是否需要装备拥有对应附魔才能使用附魔符文
  require-enchantment-for-rune: true

# ==================== BUFF检查优化配置 ====================
buff-check:
  # 检查频率（ticks）- 20 ticks = 1秒
  # 建议: 100 (5秒) 用于大型服务器
  check-period-ticks: 100
  
  # 是否检查各个装备槽位
  check-main-hand: true     # 检查主手
  check-off-hand: true      # 检查副手
  check-helmet: true        # 检查头盔
  check-chestplate: true    # 检查胸甲
  check-leggings: true      # 检查护腿
  check-boots: true         # 检查靴子
  
  # 续期阈值（ticks）- 剩余时间少于此值时续期
  # 建议: 200 (10秒)
  renew-threshold-ticks: 200
  
  # NBT缓存配置
  nbt-cache-enabled: true    # 启用NBT缓存
  nbt-cache-size: 10000      # 最大缓存物品数

# ==================== 可镶嵌物品列表 ====================
# 使用通配符*匹配所有材质
# 例如: *_SWORD 匹配所有材质的剑
# 注意：配置不区分大小写，paper、PAPER、Paper均可
socketable-items:
  - "*_SWORD"        # 所有材质的剑
  - "*_AXE"          # 所有材质的斧
  - "*_PICKAXE"      # 所有材质的镐
  - "*_SHOVEL"       # 所有材质的铲
  - "*_HOE"          # 所有材质的锄
  - "*_SPEAR"        # 所有材质的矛
  - "BOW"            # 弓
  - "CROSSBOW"       # 弩
  - "TRIDENT"        # 三叉戟
  - "MACE"           # 重锤
  - "*_HELMET"       # 所有材质的头盔
  - "*_CHESTPLATE"   # 所有材质的胸甲
  - "*_LEGGINGS"     # 所有材质的护腿
  - "*_BOOTS"        # 所有材质的靴子
  - "TURTLE_HELMET"  # 海龟壳
  - "SHIELD"         # 盾牌

# ==================== 符文拆卸粉配置 ====================
rune-remover:
  # 符文拆卸粉物品ID
  item: "SUGAR"
  # 符文拆卸粉名称
  name: "§b符文拆卸粉"
  # 符文拆卸粉自定义模型数据
  custom-model-data: 0
  # 符文拆卸粉描述
  lore:
    - "§7功能: §e拆卸已镶嵌BUFF符文的装备上的符文"
    - "§7效果: §a将符文从装备上拆下，装备不损坏"
  # 拆卸后返回buff符文的概率 (%)
  return-chance: 100
